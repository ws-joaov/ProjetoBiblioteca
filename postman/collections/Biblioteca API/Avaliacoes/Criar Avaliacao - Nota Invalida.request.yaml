$kind: http-request
name: 'Criar Avaliacao - Nota Invalida'
method: POST
url: '{{base_url}}/avaliacoes'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "descricao": "Nota inválida",
      "nota": 10,
      "usuarioId": 2,
      "livroId": 1
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 400", function () {
        pm.response.to.have.status(400);
      });

      pm.test("Response has erro field", function () {
        var jsonData = pm.response.json();
        pm.expect(jsonData).to.have.property("erro");
      });

      pm.test("erro contains Nota inválida", function () {
        var jsonData = pm.response.json();
        pm.expect(jsonData.erro).to.include("Nota inválida");
      });
