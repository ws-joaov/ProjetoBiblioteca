$kind: http-request
name: Criar Avaliacao
method: POST
url: '{{base_url}}/avaliacoes'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "descricao": "Ótimo livro, muito envolvente!",
      "nota": 5,
      "usuarioId": 2,
      "livroId": 1
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 201", function () {
        pm.response.to.have.status(201);
      });

      pm.test("Response has id field", function () {
        var jsonData = pm.response.json();
        pm.expect(jsonData).to.have.property("id");
      });

      pm.test("Response has nota equal to 5", function () {
        var jsonData = pm.response.json();
        pm.expect(jsonData.nota).to.eql(5);
      });

      pm.test("Response has descricao field", function () {
        var jsonData = pm.response.json();
        pm.expect(jsonData).to.have.property("descricao");
      });
