$kind: http-request
name: 'Criar Avaliacao - Usuario Inexistente'
method: POST
url: '{{base_url}}/avaliacoes'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "descricao": "Teste",
      "nota": 3,
      "usuarioId": 9999,
      "livroId": 1
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 400", function () {
        pm.response.to.have.status(400);
      });

      pm.test("Response has erro field", function () {
        var jsonData = pm.response.json();
        pm.expect(jsonData).to.have.property("erro");
      });

      pm.test("erro contains Usuário não encontrado", function () {
        var jsonData = pm.response.json();
        pm.expect(jsonData.erro).to.include("Usuário não encontrado");
      });
