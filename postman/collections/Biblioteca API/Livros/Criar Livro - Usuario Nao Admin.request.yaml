$kind: http-request
name: 'Criar Livro - Usuario Nao Admin'
method: POST
url: '{{base_url}}/livros'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "nome": "Livro Teste",
      "autor": "Autor",
      "editora": "Editora",
      "genero": "Ficção",
      "usuarioId": 2
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 400", function () {
        pm.response.to.have.status(400);
      });

      pm.test("Response has erro field", function () {
        var jsonData = pm.response.json();
        pm.expect(jsonData).to.have.property("erro");
      });

      pm.test("erro contains administrador", function () {
        var jsonData = pm.response.json();
        pm.expect(jsonData.erro).to.include("administrador");
      });
