$kind: http-request
name: 'Criar Usuario - Sem Email'
method: POST
url: '{{base_url}}/usuarios'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "nome": "Sem Email"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 400", function () {
        pm.response.to.have.status(400);
      });

      pm.test("Response has erro field", function () {
        var jsonData = pm.response.json();
        pm.expect(jsonData).to.have.property("erro");
      });

      pm.test("erro contains Email obrigatório", function () {
        var jsonData = pm.response.json();
        pm.expect(jsonData.erro).to.include("Email obrigatório");
      });
